<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to DOCX Converter (Pure JS)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .box { border: 2px dashed #ccc; padding: 30px; text-align: center; background: #f9f9f9; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #333; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:disabled { background: #cccccc; }
    </style>
</head>
<body>

    <h2>Convertitore da PDF a DOCX</h2>
    <p>Strumento 100% lato client (funziona su GitHub Pages senza backend).</p>

    <div class="box" onclick="document.getElementById('fileInput').click()">
        Seleziona o trascina un file PDF
        <input type="file" id="fileInput" accept=".pdf" style="display:none">
    </div>

    <div id="status"></div>
    <button id="convertBtn" disabled>Converti in DOCX</button>

    <script>
        // Configurazione del worker di PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let selectedFile = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                document.getElementById('status').innerText = `File selezionato: ${selectedFile.name}`;
                document.getElementById('convertBtn').disabled = false;
            }
        });

        document.getElementById('convertBtn').addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Lettura del PDF in corso...";
            
            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const numPages = pdf.numPages;
                
                statusDiv.innerText = `Estrazione testo da ${numPages} pagine...`;
                
                let docParagraphs = [];

                // Ciclo su tutte le pagine del PDF
                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // Raggruppiamo gli elementi di testo per linea approssimativa (coordinata Y)
                    let lastY = null;
                    let lineText = "";
                    
                    for (const item of textContent.items) {
                        // item.transform[5] corrisponde alla coordinata Y sulla pagina
                        const currentY = item.transform[5];
                        
                        if (lastY === null || Math.abs(currentY - lastY) < 5) {
                            // Stessa riga (con tolleranza di 5px)
                            lineText += item.str + " ";
                        } else {
                            // Nuova riga rilevata
                            if (lineText.trim().length > 0) {
                                docParagraphs.push(new docx.Paragraph({
                                    children: [new docx.TextRun(lineText.trim())],
                                    spacing: { after: 200 }
                                }));
                            }
                            lineText = item.str + " ";
                        }
                        lastY = currentY;
                    }
                    
                    // Aggiungi l'ultimo frammento rimasto della pagina
                    if (lineText.trim().length > 0) {
                        docParagraphs.push(new docx.Paragraph({
                            children: [new docx.TextRun(lineText.trim())]
                        }));
                    }

                    // Aggiunge una interruzione di pagina nel DOCX (tranne che per l'ultima pagina)
                    if (i < numPages) {
                        docParagraphs.push(new docx.Paragraph({
                            children: [new docx.PageBreak()]
                        }));
                    }
                }

                statusDiv.innerText = "Generazione del file Word (DOCX)...";

                // Creazione della struttura del documento DOCX
                const doc = new docx.Document({
                    sections: [{
                        properties: {},
                        children: docParagraphs,
                    }],
                });

                // Generazione del blob binario e download
                const blob = await docx.Packer.toBlob(doc);
                saveAs(blob, selectedFile.name.replace(".pdf", ".docx"));
                
                statusDiv.style.color = "green";
                statusDiv.innerText = "Conversione completata con successo!";

            } catch (error) {
                console.error(error);
                statusDiv.style.color = "red";
                statusDiv.innerText = "Errore durante la conversione: " + error.message;
            }
        });
    </script>
</body>
</html>
